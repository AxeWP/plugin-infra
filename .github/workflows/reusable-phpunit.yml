name: Run PHPUnit Tests

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: true
        type: string
      wp-version:
        description: 'WordPress version (latest, trunk, or X.Y)'
        required: false
        type: string
        default: 'latest'
      coverage:
        description: 'Enable code coverage'
        required: false
        type: boolean
        default: false
      multisite:
        description: 'Run multisite tests'
        required: false
        type: boolean
        default: false

    secrets:
      CODECOV_TOKEN:
        description: 'Codecov upload token'
        required: false

permissions: {}

jobs:
  phpunit:
    name: PHPUnit (PHP ${{ inputs.php-version }}, WP ${{ inputs.wp-version }})${{ inputs.coverage && ' (coverage)' || '' }}${{ inputs.multisite && ' (multisite)' || '' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    env:
      WP_ENV_PHP_VERSION: ${{ inputs.php-version }}
      WP_ENV_CORE: ${{ inputs.wp-version == 'trunk' && 'WordPress/WordPress' || inputs.wp-version == 'latest' && 'latest' || format('https://wordpress.org/wordpress-{0}.zip', inputs.wp-version) }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: ${{ inputs.coverage && 'xdebug' || 'none' }}

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Build development assets
        run: npm run build:dev

      - name: Start the Docker testing environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: |
            npm run wp-env:test start --${{ inputs.multisite && ' --multisite' || '' }}${{ inputs.coverage && ' --xdebug=coverage' || '' }}

      - name: Log versions
        run: |
          npm run wp-env:test -- run cli php -- -v
          npm run wp-env:test -- run cli wp core version

      - name: Run PHPUnit tests
        run: npm run test:php ${{ !inputs.coverage && '-- --no-coverage' || '' }}

      - name: Upload code coverage report
        if: ${{ inputs.coverage }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: tests/_output/php-coverage.xml
          flags: unit
          fail_ci_if_error: false

      - name: Upload HTML coverage report as artifact
        if: ${{ inputs.coverage }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wp-code-coverage-${{ inputs.php-version }}-${{ inputs.wp-version }}
          path: tests/_output/html
          overwrite: true
