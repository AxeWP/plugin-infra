name: Run JS Lints

on:
  workflow_call:
    inputs:
      eslint:
        description: 'Run ESLint check'
        required: false
        type: boolean
        default: true
      tsc:
        description: 'Run TypeScript check'
        required: false
        type: boolean
        default: true
      stylelint:
        description: 'Run Stylelint check'
        required: false
        type: boolean
        default: true
      prettier:
        description: 'Run Prettier check'
        required: false
        type: boolean
        default: true

permissions: {}

jobs:
  lint-js:
    name: JS Lint & TypeScript
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Run ESLint
        id: eslint
        if: ${{ inputs.eslint }}
        run: npm run lint:js

      - name: Run TypeScript check
        id: typescript
        if: ${{ inputs.tsc && !cancelled() }}
        run: npm run lint:js:types

      - name: Run Stylelint
        id: stylelint
        if: ${{ inputs.stylelint && !cancelled() }}
        run: npm run lint:css

      - name: Run Prettier check
        id: prettier
        if: ${{ inputs.prettier && !cancelled() }}
        run: npm run format -- --check
