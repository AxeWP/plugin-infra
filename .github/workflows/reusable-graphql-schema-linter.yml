name: Run GraphQL Schema Linter

on:
  workflow_call:
    inputs:
      php-version:
        description: 'PHP version to use'
        required: true
        type: string
      plugin-slug:
        description: 'Directory name of the plugin inside wp-content/plugins/ (used for the wp-env --env-cwd path).'
        required: true
        type: string
      previous-schema-url:
        description: 'Optional URL to a previously-released schema.graphql. When non-empty, runs `graphql-inspector diff` for breaking-change detection. Requires the consumer to have @graphql-inspector/cli installed as a devDependency.'
        required: false
        type: string
        default: ''

permissions: {}

jobs:
  schema_linter:
    name: Lint GraphQL schema
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      WP_ENV_PHP_VERSION: ${{ inputs.php-version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          show-progress: ${{ runner.debug == '1' && 'true' || 'false' }}
          persist-credentials: false

      - name: Set up PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ inputs.php-version }}
          coverage: none

      - name: Install Composer dependencies
        uses: ramsey/composer-install@65e4f84970763564f46a70b8a54b90d033b3bdda # v4.0.0

      - name: Setup Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install npm dependencies
        run: npm ci

      - name: Start the Docker testing environment
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 10
          max_attempts: 3
          command: npm run wp-env:test start

      - name: Generate the static schema
        run: |
          mkdir -p tests/_output
          npm run wp-env:test -- run cli --env-cwd=wp-content/plugins/${{ inputs.plugin-slug }} wp graphql generate-static-schema --output=tests/_output/schema.graphql
          echo "Schema generated: $(wc -l < tests/_output/schema.graphql) lines"

      # Delegates to the consumer's lint:schema script.
      - name: Lint the static schema
        run: npm run lint:schema

      - name: Upload generated schema as artifact
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: generated-schema.graphql
          path: tests/_output/schema.graphql
          if-no-files-found: warn
          retention-days: 14

      # Breaking-change detection (optional) — only runs when previous-schema-url is set.
      - name: Download previous schema
        if: ${{ !cancelled() && inputs.previous-schema-url != '' }}
        run: |
          curl --fail --location --silent --show-error \
            "${{ inputs.previous-schema-url }}" \
            --output /tmp/previous-schema.graphql
          echo "Previous schema: $(wc -l < /tmp/previous-schema.graphql) lines"

      - name: Run GraphQL Inspector diff
        if: ${{ !cancelled() && inputs.previous-schema-url != '' }}
        run: npx --no-install graphql-inspector diff /tmp/previous-schema.graphql tests/_output/schema.graphql
