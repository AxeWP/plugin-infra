version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    commit-message:
      prefix: 'fix'
      include: 'scope'
    labels:
      - Dependencies
    groups:
      github-actions:
        patterns:
          - '*'
        update-types:
          - minor
          - patch
    cooldown:
      default-days: 7

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 7
    versioning-strategy: increase
    commit-message:
      prefix: 'chore'
      include: 'scope'
    labels:
      - Dependencies
    groups:
      npm-dev-minor-patch:
        dependency-type: 'development'
        update-types: [minor, patch]
      npm-prod-minor-patch:
        dependency-type: 'production'
        update-types: [minor, patch]
